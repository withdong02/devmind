# DevMind Full Stack
# Prerequisites: Docker Desktop with WSL2 backend enabled on Windows
# Run: docker-compose up -d
# Frontend: http://localhost:3000
# Backend: http://localhost:8080

version: '3.8'

services:
  # PostgreSQL with pgvector
  postgres:
    image: pgvector/pgvector:pg16
    container_name: devmind-postgres
    environment:
      POSTGRES_DB: devmind
      POSTGRES_USER: devmind
      POSTGRES_PASSWORD: devmind
    ports:
      - "5432:5432"
    volumes:
      - devmind-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U devmind"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: devmind-redis
    ports:
      - "6379:6379"
    volumes:
      - devmind-redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # DevMind Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: devmind-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/devmind
      SPRING_DATASOURCE_USERNAME: devmind
      SPRING_DATASOURCE_PASSWORD: devmind
      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
      SPRING_AI_OPENAI_BASE_URL: https://token-plan-cn.xiaomimimo.com
      SPRING_AI_OPENAI_API_KEY: ${MIMO_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # DevMind Frontend
  frontend:
    build:
      context: ./devmind-frontend
      dockerfile: Dockerfile
    container_name: devmind-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  devmind-pgdata:
  devmind-redisdata:
